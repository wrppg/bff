name: Check update every 12hr

on:
  schedule:
    - cron: "48 3,15 * * *"
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          while read -r vercode ref repo _ java _; do
            echo $vercode | grep -iE -v -q '^[0-9]' && continue

            if [[ "$ref" == "default" ]]; then
              ref=$(gh repo view $repo --json defaultBranchRef --jq '.defaultBranchRef.name')
            fi

            # LATEST=$((curl -sfL "https://raw.githubusercontent.com/${repo}/refs/heads/${ref}/app/build.gradle" \
            # || curl -sfL "https://raw.githubusercontent.com/${repo}/refs/heads/${ref}/app/build.gradle.kts") \
            # | awk '/^\s*versionCode( |=)/ { match($0, /[0-9]+/); print substr($0, RSTART, RLENGTH); exit }')

            LATEST=$(curl -sfL -Z "https://raw.githubusercontent.com/${repo}/refs/heads/${ref}/app/build.gradle"{,.kts} 2>/dev/null | \
            grep -m 1 -oP 'versionCode\s*[= ]\s*\K[0-9]+')
            
            if [[ "$LATEST" -ne "$vercode" && -n $LATEST && -n $vercode ]]; then
                echo "✨ Detect version change $repo: $vercode --> $LATEST"
                gh workflow run Main-Build.yaml -f repo="$repo" -f ref="$ref" -f vercode="$LATEST" -f java="$java"
                continue
            fi
            echo "✅ $repo is up to date already. $vercode <-> $LATEST"
          done < app_record.txt
